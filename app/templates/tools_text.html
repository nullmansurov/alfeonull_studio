{% extends "layout.html" %}{% block title %}Text Generator{% endblock %}{% block content %}<h2 class="display-6 fw-bold m-0 text-white mb-5">Text Generator Engine</h2><div class="row g-5"><div class="col-xl-4"><div class="alf-card"><form method="POST"><div class="mb-4"><label class="small text-muted fw-bold text-uppercase tracking-wide mb-3">Input Text</label><textarea name="text" class="form-control py-3" rows="4" required>System Test</textarea></div><div class="mb-5"><label class="small text-muted fw-bold text-uppercase tracking-wide mb-3">System Font</label><select name="font" class="form-select py-3">{% for f in fonts %}<option value="{{ f }}">{{ f }}</option>{% endfor %}</select></div><button class="alf-btn w-100 py-3 fs-6"><i class="fa-solid fa-wand-magic-sparkles me-2"></i>Generate Preview</button></form></div></div><div class="col-xl-8">{% if preview_url %}<div class="alf-card text-center d-flex flex-column align-items-center justify-content-center" style="min-height: 400px; background: repeating-conic-gradient(rgba(255,255,255,0.02) 0% 25%, transparent 0% 50%) 50% / 20px 20px;"><img src="{{ preview_url }}" class="img-fluid drop-shadow mb-5" style="max-height: 400px;"><a href="{{ preview_url }}" download class="alf-btn-sec py-2 px-4 rounded-pill"><i class="fa-solid fa-download me-2"></i>Export Graphic (PNG)</a></div>{% else %}<div class="alf-card text-center d-flex flex-column align-items-center justify-content-center text-muted" style="min-height: 400px; border-style: dashed !important; opacity: 0.5;"><i class="fa-solid fa-font fa-4x mb-3 opacity-25"></i><h5 class="fw-bold">No Render Selected</h5><p>Input text to generate an alpha-channel graphic.</p></div>{% endif %}</div></div><style>.tracking-wide { letter-spacing: 1.5px; } .drop-shadow { filter: drop-shadow(0 10px 25px rgba(0,0,0,0.5)); }</style>{% endblock %}
