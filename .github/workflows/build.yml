name: Build Portable Studio

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: Alfeonull_Studio_Windows
            ffmpeg_url: "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
            
          - os: macos-latest
            artifact_name: Alfeonull_Studio_Mac
            ffmpeg_url: "https://evermeet.cx/ffmpeg/getrelease/zip"
            
          - os: ubuntu-latest
            artifact_name: Alfeonull_Studio_Linux
            ffmpeg_url: "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller Pillow

    - name: Convert Icon & Build Executable (PyInstaller)
      shell: bash
      run: |
        # Автоматически конвертируем PNG в формат ICO для Windows
        python -c "from PIL import Image; Image.open('icon.png').save('icon.ico')"
        
        # Компилируем .exe с нашей иконкой
        if [ "$RUNNER_OS" == "Windows" ]; then
          pyinstaller --noconsole --icon="icon.ico" --name "Alfeonull_Studio" run.py
        else
          pyinstaller --noconsole --icon="icon.png" --name "Alfeonull_Studio" run.py
        fi

    - name: Download & Extract FFmpeg (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        curl -L -o ffmpeg.zip ${{ matrix.ffmpeg_url }}
        7z x ffmpeg.zip -y -otemp_win
        mkdir -p dist/Alfeonull_Studio/ffmpeg/bin
        cp temp_win/ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe dist/Alfeonull_Studio/ffmpeg/bin/

    - name: Download & Extract FFmpeg (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        curl -L -o ffmpeg.zip ${{ matrix.ffmpeg_url }}
        unzip -o ffmpeg.zip -d temp_mac
        mkdir -p dist/Alfeonull_Studio/ffmpeg/bin
        cp temp_mac/ffmpeg dist/Alfeonull_Studio/ffmpeg/bin/
        chmod +x dist/Alfeonull_Studio/ffmpeg/bin/ffmpeg

    - name: Download & Extract FFmpeg (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        curl -L -o ffmpeg.tar.xz ${{ matrix.ffmpeg_url }}
        mkdir -p temp_linux
        tar -xf ffmpeg.tar.xz -C temp_linux
        mkdir -p dist/Alfeonull_Studio/ffmpeg/bin
        cp temp_linux/ffmpeg-*-static/ffmpeg dist/Alfeonull_Studio/ffmpeg/bin/
        chmod +x dist/Alfeonull_Studio/ffmpeg/bin/ffmpeg

    - name: Assemble Portable Folder
      shell: bash
      run: |
        # Копируем структуру проекта
        cp -r app dist/Alfeonull_Studio/
        # Обязательно кладем иконку, чтобы она отображалась в интерфейсе и трее
        cp icon.png dist/Alfeonull_Studio/ 2>/dev/null || true

    - name: Upload Artifacts (ZIP)
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/Alfeonull_Studio/
