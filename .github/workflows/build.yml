name: Build Portable Studio (Raw Python)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write # Необходимо для создания релизов

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: Alfeonull_Studio_Windows
            ffmpeg_url: "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
            shotcut_url: "https://github.com/mltframework/shotcut/releases/download/v24.04.28/shotcut-win64-240428.zip"
            
          - os: macos-latest
            artifact_name: Alfeonull_Studio_Mac
            ffmpeg_url: "https://evermeet.cx/ffmpeg/getrelease/zip"
            shotcut_url: "https://github.com/mltframework/shotcut/releases/download/v24.04.28/shotcut-macos-240428.dmg"
            
          - os: ubuntu-latest
            artifact_name: Alfeonull_Studio_Linux
            ffmpeg_url: "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
            shotcut_url: "https://github.com/mltframework/shotcut/releases/download/v24.04.28/shotcut-linux-x86_64-240428.txz"

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Bundle FFmpeg
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          curl -L -o ffmpeg_dist.zip ${{ matrix.ffmpeg_url }}
          7z x ffmpeg_dist.zip -y -otemp_ff
          mkdir -p dist/Alfeonull_Studio/ffmpeg/bin
          cp temp_ff/ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe dist/Alfeonull_Studio/ffmpeg/bin/
        elif [ "$RUNNER_OS" == "macOS" ]; then
          curl -L -o ffmpeg_dist.zip ${{ matrix.ffmpeg_url }}
          unzip -o ffmpeg_dist.zip -d temp_ff
          mkdir -p dist/Alfeonull_Studio/ffmpeg/bin
          cp temp_ff/ffmpeg dist/Alfeonull_Studio/ffmpeg/bin/
          chmod +x dist/Alfeonull_Studio/ffmpeg/bin/ffmpeg
        elif [ "$RUNNER_OS" == "Linux" ]; then
          curl -L -o ffmpeg_dist.tar.xz ${{ matrix.ffmpeg_url }}
          mkdir -p temp_ff
          tar -xf ffmpeg_dist.tar.xz -C temp_ff
          mkdir -p dist/Alfeonull_Studio/ffmpeg/bin
          cp temp_ff/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg dist/Alfeonull_Studio/ffmpeg/bin/
          chmod +x dist/Alfeonull_Studio/ffmpeg/bin/ffmpeg
        fi

    - name: Bundle Portable Melt (Shotcut)
      shell: bash
      run: |
        mkdir -p dist/Alfeonull_Studio/melt
        
        if [ "$RUNNER_OS" == "Windows" ]; then
          curl -L -o shotcut_dist.zip ${{ matrix.shotcut_url }}
          7z x shotcut_dist.zip -y -oshotcut_temp
          cp -r shotcut_temp/shotcut/* dist/Alfeonull_Studio/melt/
        elif [ "$RUNNER_OS" == "macOS" ]; then
          curl -L -o shotcut_dist.dmg ${{ matrix.shotcut_url }}
          hdiutil attach shotcut_dist.dmg -mountpoint /Volumes/Shotcut
          cp -R /Volumes/Shotcut/Shotcut.app dist/Alfeonull_Studio/melt/
          hdiutil detach /Volumes/Shotcut
        elif [ "$RUNNER_OS" == "Linux" ]; then
          curl -L -o shotcut_dist.txz ${{ matrix.shotcut_url }}
          mkdir -p temp_melt
          tar -xf shotcut_dist.txz -C temp_melt
          cp -r temp_melt/Shotcut/* dist/Alfeonull_Studio/melt/ 2>/dev/null || cp -r temp_melt/shotcut/* dist/Alfeonull_Studio/melt/
        fi

    - name: Finalize Project Folders
      shell: bash
      run: |
        cp -r app dist/Alfeonull_Studio/
        cp config.py dist/Alfeonull_Studio/
        cp requirements.txt dist/Alfeonull_Studio/
        cp icon.png dist/Alfeonull_Studio/
        
        cp run.py dist/Alfeonull_Studio/run.pyw
        cp run.py dist/Alfeonull_Studio/
        
        mkdir -p dist/Alfeonull_Studio/instance

    - name: Zip Release Artifact
      shell: bash
      run: |
        cd dist
        if [ "$RUNNER_OS" == "Windows" ]; then
          # Для Windows используем встроенный 7-Zip
          7z a -tzip ../${{ matrix.artifact_name }}.zip Alfeonull_Studio/
        else
          # Для Mac и Linux используем стандартный zip
          zip -r ../${{ matrix.artifact_name }}.zip Alfeonull_Studio/
        fi

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: "Alfeonull Studio ${{ github.event.inputs.version }}"
        files: ${{ matrix.artifact_name }}.zip
        draft: false
        prerelease: false
