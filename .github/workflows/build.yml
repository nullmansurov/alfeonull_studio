name: Build Portable Studio

on:
  workflow_dispatch: # Это добавит кнопку "Run workflow" на GitHub, чтобы ты мог запускать сборку вручную

jobs:
  build:
    strategy:
      matrix:
        # Указываем 3 операционные системы для сборки
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Executable
      run: pyinstaller --noconsole --name "Alfeonull_Studio" run.py

    - name: Prepare Portable Folder
      shell: bash
      run: |
        # Копируем папку app (с шаблонами и статикой) к собранной программе
        cp -r app dist/Alfeonull_Studio/
        # Копируем ffmpeg (если он есть)
        cp -r ffmpeg dist/Alfeonull_Studio/ 2>/dev/null || true

    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: Alfeonull_Studio_${{ matrix.os }}
        path: dist/Alfeonull_Studio/
